{% extends 'base.html'%}

{% block conteudo%}
<h2 class="text-info">Funcionario</h2>
<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
    cadrastrar funcionario
</button>

<!-- Modal -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="staticBackdropLabel">Novo funcionario</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form class="form-subtrair" action="{{ url_for('hexagono') }}" method="post">
            <label>
                Nome:
                <input placeholder="digite o nome" name="form-nome" class="form-control">
                Data de nascimento:
                <input placeholder="dd/mm/aaaa" name="form-nome" class="form-control">
                cpf:
                 <input placeholder="digite somente numeros" name="form-nome" class="form-control">
                Email:
                <input placeholder="digite um Email" name="form-nome" class="form-control">
                Senha:
                <input placeholder="digite senha" name="form-nome" class="form-control">
                cargo:
                <input placeholder="digite o seu cargo" name="form-nome" class="form-control">
                salario que deseja:
                <input placeholder="digite aqui" name="form-nome" class="form-control">
            </label>

            <button type="submit" class="btn btn-success">cadastrar</button>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">fechar</button>
      </div>
    </div>
  </div>
</div>
<table class="table">
    <thead>
    <tr>
        <th scope="col">id</th>
        <th scope="col">nome</th>
        <th scope="col">data de nascimento</th>
        <th scope="col">cpf</th>
        <th scope="col">email</th>
        <th scope="col">senha</th>
        <th scope="col">cargo</th>
        <th scope="col">salario</th>
        <th scope="col">açoes</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <th scope="row">1</th>
        <td>Pedro</td>
        <td>02/11/07</td>
        <td>545454</td>
        <td>pedro.zanetti@hotmail.com</td>
        <td>1234</td>
        <td>empresario</td>
        <td>10000</td>
        <td><a href=""><i class="bi-pencil"></i></a> <a href=""><i class="bi bi-trash text-danger"></i></a></td>
    </tr>

</table>
{%endblock%}
